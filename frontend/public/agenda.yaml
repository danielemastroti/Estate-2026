  - id: 2
    name: "Giorno 2"
    date: "Domenica 16 Agosto - Friburgo in Brisgovia (Germania)"
    morning:
      - time: "07:30"
        title: "Partenza per Friburgo"
        description: "Parcheggio P&R Bissierstraße 7, 79114 Freiburg im Breisgau o in alternativa Park & Ride Munzinger Straße, Munzinger Str. 1b - arrivare non oltre le 9.30 "
        link: "https://www.google.com/maps/dir/9+Rte+de+B%C3%A2le,+68000+Colmar,+Francia/Park+and+Ride,+Bissierstra%C3%9Fe+7,+79114+Freiburg+im+Breisgau-West,+Germania/@47.923673,7.2600389,55565m/data=!3m2!1e3!4b1!4m13!4m12!1m5!1m1!1s0x479165ef1104e56f:0x617fcf36194b8307!2m2!1d7.3609703!2d48.0717648!1m5!1m1!1s0x47911b6d6515b9bf:0x8ecd69021b49612a!2m2!1d7.8193169!2d48.0017464?entry=ttu&g_ep=EgoyMDI2MDcxMi4wIKXMDSoASAFQAw%3D%3D"
        suggerimenti: "Se non hai il bollino ambientale, parcheggia nei Park&Ride"

      - time: "08:30"
        title: "Arrivo parcheggio Friburgo"
        description: "Arrivo a parcheggio P&R Bissierstraße, 7 - Acquistare il biglietto P+R con titolo di viaggio giornaliero dal distributore del parcheggio"
        link: "https://www.google.com/maps/dir/9+Rte+de+B%C3%A2le,+68000+Colmar,+Francia/Park+and+Ride,+Bissierstra%C3%9Fe+7,+79114+Freiburg+im+Breisgau-West,+Germania/@47.923673,7.2600389,55565m/data=!3m2!1e3!4b1!4m13!4m12!1m5!1m1!1s0x479165ef1104e56f:0x617fcf36194b8307!2m2!1d7.3609703!2d48.0717648!1m5!1m1!1s0x47911b6d6515b9bf:0x8ecd69021b49612a!2m2!1d7.8193169!2d48.0017464?entry=ttu&g_ep=EgoyMDI2MDcxMi4wIKXMDSoASAFQAw%3D%3D"
        suggerimenti: ""

      - time: "09:00"
        title: "Partenza per centro storico di Friburgo"
        description: "Prendere tram linea 3 (Stadtbahn 3) in direzione Vauban, scendere a Bertoldsbrunnen"
        link: "https://www.google.com/maps/dir/9+Rte+de+B%C3%A2le,+68000+Colmar,+Francia/Park+and+Ride,+Bissierstra%C3%9Fe+7,+79114+Freiburg+im+Breisgau-West,+Germania/@47.923673,7.2600389,55565m/data=!3m2!1e3!4b1!4m13!4m12!1m5!1m1!1s0x479165ef1104e56f:0x617fcf36194b8307!2m2!1d7.3609703!2d48.0717648!1m5!1m1!1s0x47911b6d6515b9bf:0x8ecd69021b49612a!2m2!1d7.8193169!2d48.0017464?entry=ttu&g_ep=EgoyMDI2MDcxMi4wIKXMDSoASAFQAw%3D%3D"
      
      - time: "09:20"
        title: "Münsterplatz"
        description: "Piazza vivace che circonda il magnifico Duomo di Friburgo"
        link: "https://www.mycityhunt.it/citta/friburgo-de-5227/poi/muensterplatz-38823"
      
      - time: "10:00"
        title: "Cattedrale di Nostra Signora"
        description: "La cattedrale di Friburgo in Brisgovia, è una delle poche grandi chiese gotiche tedesche la cui costruzione fu portata a termine ancora in epoca medievale"
        link: "https://it.wikipedia.org/wiki/Cattedrale_di_Friburgo_in_Brisgovia"

      - time: "11:00"
        title: "Münstermarkt"
        description: "Un mercato vivace e animato situato nella vivace piazza di Munsterplatz"
        link: "https://wanderlog.com/it/place/details/1195805/m%C3%BCnstermarkt"

      - time: "12:30"
        title: "Pranzo"
        description: "Pranzo TBD"
        link: ""
   
    afternoon:
      - time: "15:00"
        title: "Schlossberg"
        description: "Collina verdeggiante che si erge maestosamente sopra Friburgo"
        link: "https://www.mycityhunt.it/citta/friburgo-de-5227/poi/schlossberg-68934" 
      
      - time: "18:00"
        title: "Funicolare"
        description: "Prendere funicolare per scendere fino a Stadtgarten"
        link: "https://www.graztourismus.at/it/attrazioni-e-cultura/luoghi-di-interesse/funicolare-dello-schlossberg_shg_1482" 

      - time: "18:15"
        title: "Centro storico"
        description: "Giro nel centro storico"
        link: "" 
        suggerimenti: "Da provare: Schnitzel, Birra locale, Brezel appena sfornati"

      - time: "19:00"
        title: "Bächle"
        description: "Bächle"
        link: "https://worldcitytrail.com/it/2025/07/27/il-bachle-a-freiburg/" 
        suggerimenti: "Controlla che nei Bächle non galleggi una paperella: è una tradizione simpatica della città"
      
    evening:
      - time: "20:00"
        title: "Cena"
        description: "Cena in un Biergarten ad esempio Kastaniengarten"
        link: "https://www.komoot.com/it-it/highlight/296788"

  - id: 3
    name: "Giorno 3"
    date: "Lunedì 17 Agosto - I Borgi della strada dei vini "
    morning:
      - time: "08:00"
        title: "Strade colorate di Riquewihr"
