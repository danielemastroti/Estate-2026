      - time: "16:30"
        title: "Check-in"
        description: "Check-in presso Subtil insolite, 9 Route de Bâle"
        link: "https://www.google.com/maps/place/9+Rte+de+B%C3%A2le,+68000+Colmar,+Francia/@48.0717684,7.35839,433m/data=!3m2!1e3!4b1!4m6!3m5!1s0x479165ef1104e56f:0x617fcf36194b8307!8m2!3d48.0717648!4d7.3609703!16s%2Fg%2F11c19vp96s?entry=ttu&g_ep=EgoyMDI2MDcxMi4wIKXMDSoASAFQAw%3D%3D" 
      
